<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Atendente24h — Logo Proposals</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #07100a;
      font-family: -apple-system, 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
      color: #fafafa;
      min-height: 100vh;
    }

    .header {
      padding: 60px 80px 40px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .eyebrow {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #16c778;
      opacity: 0.8;
      margin-bottom: 12px;
    }

    h1 {
      font-size: 36px;
      font-weight: 700;
      letter-spacing: -0.03em;
      line-height: 1.1;
      color: #ffffff;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 14px;
      color: rgba(255,255,255,0.4);
      font-weight: 400;
      letter-spacing: -0.01em;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 2px;
      padding: 2px;
    }

    .logo-card {
      position: relative;
      aspect-ratio: 1;
      overflow: hidden;
      cursor: pointer;
      background: #040a06;
      transition: transform 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .logo-card:hover {
      z-index: 10;
      transform: scale(1.02);
    }

    .logo-card img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .logo-number {
      position: absolute;
      bottom: 12px;
      left: 12px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(8px);
      padding: 4px 8px;
      border-radius: 4px;
    }

    .logo-card:hover .logo-number {
      color: rgba(22, 199, 120, 0.9);
    }

    .footer {
      padding: 40px 80px;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .footer-note {
      font-size: 12px;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.02em;
    }

    .accent {
      color: #16c778;
    }
  </style>
</head>
<body>

  <div class="header">
    <div class="eyebrow">Brand Identity — Round 02</div>
    <h1>Atendente<span class="accent">24h</span></h1>
    <p class="subtitle">10 propostas de simbolo — SaaS Atendente WhatsApp com IA</p>
  </div>

  <div class="grid">
    <div class="logo-card">
      <img src="logo-01.jpg" alt="Logo 01">
      <div class="logo-number">01</div>
    </div>
    <div class="logo-card">
      <img src="logo-02.jpg" alt="Logo 02">
      <div class="logo-number">02</div>
    </div>
    <div class="logo-card">
      <img src="logo-03.jpg" alt="Logo 03">
      <div class="logo-number">03</div>
    </div>
    <div class="logo-card">
      <img src="logo-04.jpg" alt="Logo 04">
      <div class="logo-number">04</div>
    </div>
    <div class="logo-card">
      <img src="logo-05.jpg" alt="Logo 05">
      <div class="logo-number">05</div>
    </div>
    <div class="logo-card">
      <img src="logo-06.jpg" alt="Logo 06">
      <div class="logo-number">06</div>
    </div>
    <div class="logo-card">
      <img src="logo-07.jpg" alt="Logo 07">
      <div class="logo-number">07</div>
    </div>
    <div class="logo-card">
      <img src="logo-08.jpg" alt="Logo 08">
      <div class="logo-number">08</div>
    </div>
    <div class="logo-card">
      <img src="logo-09.jpg" alt="Logo 09">
      <div class="logo-number">09</div>
    </div>
    <div class="logo-card">
      <img src="logo-10.jpg" alt="Logo 10">
      <div class="logo-number">10</div>
    </div>
  </div>

  <div class="footer">
    <div class="footer-note">Paleta: <span class="accent">#16c778</span> verde — preto atmosferico</div>
    <div class="footer-note">2026 — Plinio Rocha for Atendente24h</div>
  </div>

</body>
</html>
